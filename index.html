    <!-- Safari Stability Safety Script -->
    <script>
      // Polyfill for modern ESM features that often crash older Safari
      if (typeof import.meta === 'undefined') {
        window.import = { meta: { url: window.location.href } };
      }
      if (typeof globalThis === 'undefined') {
        window.globalThis = window;
      }
      // Suppress modern CSS errors in console for truly ancient browsers
      window.onerror = function(msg, url, line) {
        if (msg.indexOf('import.meta') > -1) {
          console.warn('Safari Compatibility Warning: Modern JS detected. Attempting fallback...');
          return true;
        }
        return false;
      };
    </script>

  </body>
